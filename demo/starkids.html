<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Star Kids — интерактивный прототип</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        height: 100%;
        background: #1F1B18;
        font-family: 'Hanken Grotesk', system-ui, sans-serif;
        overflow: hidden;
    }

    .back-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        padding: 12px 16px;
        background: rgba(31, 27, 24, 0.92);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 600;
        padding: 8px 12px;
        border-radius: 6px;
        transition: color 150ms, background 150ms;
        min-height: 44px;
    }
    .back-btn:hover {
        color: #fff;
        background: rgba(255,255,255,0.08);
    }
    .back-btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
    }

    .demo-frame {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
    }

    .demo-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        padding-top: 56px; /* height of back bar */
    }
</style>
</head>
<body>
<div class="back-bar">
    <a class="back-btn" href="/cases/starkids.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Назад к кейсу
    </a>
</div>

<div class="demo-frame">
    <iframe
        src="../Starkids(2)/Star%20Kids%20Redesign.html"
        title="Star Kids — интерактивный прототип"
        loading="lazy"
        allow="clipboard-write"
        referrerpolicy="no-referrer"
    ></iframe>
</div>
</body>
</html>
